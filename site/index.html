<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重大新闻挖掘器</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <!-- 固定顶部区域 -->
        <div class="sticky-top">
            <header class="header">
                <div class="header-inner">
                    <h1 class="logo">📰 新闻挖掘器</h1>
                    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                        <span class="icon-light">☀️</span>
                        <span class="icon-dark">🌙</span>
                    </button>
                </div>
            </header>
            <div class="hero" id="heroSection">
                <div class="hero-inner">
                    <p class="hero-tagline">每天只读 10 条新闻，不错过天下大事</p>
                    <p class="hero-sub">AI 从 20+ 信息源中筛选真正重要的新闻，帮你省下刷手机的时间</p>
                    <div class="hero-stats">
                        <span class="stat-item">📡 覆盖中英文 20+ 新闻源</span>
                        <span class="stat-divider">·</span>
                        <span class="stat-item">🤖 AI 智能筛选</span>
                        <span class="stat-divider">·</span>
                        <span class="stat-item">⏰ 每日自动更新</span>
                    </div>
                </div>
            </div>
            <nav class="tabs">
                <div class="tabs-inner">
                    <button class="tab active" data-tab="recent">近三天大新闻</button>
                    <button class="tab" data-tab="archive">📁 归档新闻</button>
                    <button class="tab" data-tab="search">🔍 搜索</button>
                </div>
            </nav>
        </div>

        <!-- 可滚动内容区 -->
        <main class="content" id="scrollArea">
            <div class="container">
                <section class="tab-panel active" id="panelRecent">
                    <div class="news-list" id="recentNews">
                        <div class="empty-state"><p>加载中...</p></div>
                    </div>
                </section>
                <section class="tab-panel" id="panelArchive">
                    <div class="archive-tree" id="archiveTree">
                        <div class="empty-state"><p>加载中...</p></div>
                    </div>
                </section>
                <section class="tab-panel" id="panelSearch">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索新闻标题、摘要、关键词..." aria-label="搜索新闻">
                    </div>
                    <div class="search-meta" id="searchMeta"></div>
                    <div class="news-list" id="searchResults">
                        <div class="empty-state"><p>输入关键词搜索所有新闻</p></div>
                    </div>
                </section>
                <footer class="footer">
                    <p class="footer-slogan">信息过载的时代，少即是多</p>
                    <p>重大新闻挖掘器 · AI 自动筛选现象级新闻</p>
                    <p class="update-schedule">每日北京时间 07:30 · 12:30 · 19:30 自动更新</p>
                </footer>
            </div>
        </main>

        <!-- 弹窗 -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <button class="modal-close" id="modalClose" aria-label="关闭">✕</button>
                <div class="modal-content" id="modalContent"></div>
            </div>
        </div>
    </div>

    <script src="data/all-data.js"></script>
    <script src="app.js"></script>
</body>

</html>
